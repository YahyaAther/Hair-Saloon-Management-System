<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book — Lumière Hair Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:#0d0b09;}
  ::selection{background:#c9956b;color:#0d0b09;}
  input::placeholder,textarea::placeholder{color:#7a6e5c;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(217,177,137,.7)!important;}
  @keyframes lumRise{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
  .chip{text-align:center;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;border-radius:3px;transition:all .25s;background:rgba(13,11,9,.4);border:1px solid rgba(217,177,137,.16);}
  .chip.active{background:rgba(217,177,137,.16);border-color:rgba(217,177,137,.7);}
</style>
</head>
<body>
<div style="position:relative;width:100%;min-height:100vh;background:linear-gradient(180deg,#16120f 0%,#100d0b 50%,#0a0807 100%);font-family:'Hanken Grotesk',sans-serif;color:#efe7da;overflow-x:hidden;">

  <canvas id="main-canvas" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block;opacity:.85;"></canvas>
  <div style="position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 90% at 70% 30%,rgba(13,11,9,.2) 30%,rgba(13,11,9,.78) 100%);"></div>

  <header style="position:fixed;top:0;left:0;width:100%;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:28px 6vw;">
    <a href="index.html" style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;letter-spacing:.04em;color:#f6efe4;text-decoration:none;">Lumi<span style="font-style:italic;">è</span>re</a>
    <a href="index.html" style="font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:#bcae9c;text-decoration:none;">← Back to atelier</a>
  </header>

  <main style="position:relative;z-index:10;max-width:1180px;margin:0 auto;padding:18vh 6vw 12vh;display:grid;grid-template-columns:1fr 1.1fr;gap:7vw;align-items:start;">

    <!-- Left info panel -->
    <div style="position:sticky;top:18vh;">
      <span style="font-size:.74rem;letter-spacing:.42em;text-transform:uppercase;color:#c9956b;">Reservations</span>
      <h1 style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(2.8rem,5.5vw,5rem);line-height:.98;margin-top:22px;color:#f6efe4;">Reserve<br><span style="font-style:italic;color:#d9b189;">your chair.</span></h1>
      <p style="max-width:380px;margin-top:26px;font-size:1.02rem;font-weight:300;line-height:1.75;color:#b6a995;">Tell us a little about what you're after and we'll confirm by message within the hour. Limited chairs each day.</p>
      <div style="margin-top:48px;display:flex;flex-direction:column;gap:20px;font-size:.82rem;letter-spacing:.06em;color:#9a8d79;">
        <div style="display:flex;gap:14px;align-items:center;"><span style="color:#d9b189;font-family:'Cormorant Garamond',serif;font-size:1.3rem;">⟡</span> 12 Rue de la Lumière</div>
        <div style="display:flex;gap:14px;align-items:center;"><span style="color:#d9b189;font-family:'Cormorant Garamond',serif;font-size:1.3rem;">⟡</span> Tuesday – Sunday · 9h – 19h</div>
        <div style="display:flex;gap:14px;align-items:center;"><span style="color:#d9b189;font-family:'Cormorant Garamond',serif;font-size:1.3rem;">⟡</span> +1 800 000 0000</div>
      </div>
    </div>

    <!-- Right booking form -->
    <div style="background:rgba(24,19,15,.6);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(217,177,137,.18);border-radius:6px;padding:48px 44px;">

      <!-- Confirmation state -->
      <div id="confirm-panel" style="display:none;text-align:center;padding:40px 0;animation:lumRise .8s ease;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:4rem;color:#d9b189;line-height:1;">⟡</div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:2.4rem;margin-top:20px;color:#f6efe4;">Request received</h2>
        <p id="confirm-msg" style="max-width:340px;margin:18px auto 0;font-size:1rem;font-weight:300;line-height:1.7;color:#b6a995;"></p>
        <button onclick="resetForm()" style="margin-top:34px;padding:14px 34px;background:transparent;border:1px solid rgba(217,177,137,.45);color:#e8ddcd;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;border-radius:2px;cursor:pointer;">Book another</button>
      </div>

      <!-- Form -->
      <div id="form-panel">

        <!-- Service selection -->
        <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin-bottom:14px;">Service</label>
        <div id="service-chips" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div>

        <!-- Stylist selection -->
        <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin:34px 0 14px;">Stylist</label>
        <div id="stylist-chips" style="display:flex;gap:10px;flex-wrap:wrap;"></div>

        <!-- Date & Time -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:34px;">
          <div>
            <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin-bottom:12px;">Date</label>
            <input id="input-date" type="date" style="width:100%;background:rgba(13,11,9,.5);border:1px solid rgba(217,177,137,.22);border-radius:3px;padding:14px 16px;color:#efe7da;font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;color-scheme:dark;">
          </div>
          <div>
            <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin-bottom:12px;">Time</label>
            <div id="time-chips" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
          </div>
        </div>

        <!-- Name & Phone -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:34px;">
          <div>
            <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin-bottom:12px;">Name</label>
            <input id="input-name" placeholder="Your name" style="width:100%;background:rgba(13,11,9,.5);border:1px solid rgba(217,177,137,.22);border-radius:3px;padding:14px 16px;color:#efe7da;font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;">
          </div>
          <div>
            <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin-bottom:12px;">Phone</label>
            <input id="input-phone" placeholder="+1 …" style="width:100%;background:rgba(13,11,9,.5);border:1px solid rgba(217,177,137,.22);border-radius:3px;padding:14px 16px;color:#efe7da;font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;">
          </div>
        </div>

        <!-- Notes -->
        <label style="display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#c9956b;margin:34px 0 12px;">Notes <span style="color:#7a6e5c;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <textarea id="input-notes" rows="3" placeholder="Inspiration, length, anything we should know…" style="width:100%;background:rgba(13,11,9,.5);border:1px solid rgba(217,177,137,.22);border-radius:3px;padding:14px 16px;color:#efe7da;font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;resize:vertical;"></textarea>

        <button id="submit-btn" onclick="submitForm()" style="width:100%;margin-top:34px;padding:18px;background:#d9b189;color:#16120f;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;border:none;border-radius:3px;cursor:pointer;">Request appointment</button>
        <div id="form-error" style="display:none;margin-top:14px;text-align:center;font-size:.82rem;color:#d99c7a;"></div>

      </div>
    </div>
  </main>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

// --- State ---
const state = {
  serviceId: null, serviceName: '', staffId: null, staffName: 'First available',
  time: '', services: [], staff: [],
};

const times = ['09:30', '11:00', '13:30', '15:00', '16:30', '18:00'];

// --- Load services from API ---
async function loadServices() {
  try {
    const res = await fetch('api/index.php?action=services');
    if (res.ok) { const d = await res.json(); if (Array.isArray(d) && d.length) return d; }
  } catch (_) {}
  return [
    { id: 1, name: 'Sculpted Cut', price: 120 },
    { id: 2, name: 'Light Colour', price: 180 },
    { id: 3, name: 'Finish & Form', price: 90 },
    { id: 4, name: 'Full Transformation', price: 320 },
  ];
}

async function loadStaff() {
  try {
    const res = await fetch('api/index.php?action=staff');
    if (res.ok) { const d = await res.json(); if (Array.isArray(d) && d.length) return d; }
  } catch (_) {}
  return [];
}

function chip(text, sub, isActive, onClick) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (isActive ? ' active' : '');
  btn.style.cssText = 'padding:16px 14px;';
  btn.innerHTML = `<div style="font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:#f1e9dc;">${text}</div>${sub ? `<div style="font-size:.72rem;letter-spacing:.06em;color:#9a8d79;margin-top:4px;">${sub}</div>` : ''}`;
  btn.onclick = onClick;
  return btn;
}

function smallChip(text, isActive, onClick) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (isActive ? ' active' : '');
  btn.style.cssText = 'padding:11px 20px;font-size:.85rem;color:#e8ddcd;';
  btn.textContent = text;
  btn.onclick = onClick;
  return btn;
}

function tinyChip(text, isActive, onClick) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (isActive ? ' active' : '');
  btn.style.cssText = 'padding:9px 13px;font-size:.82rem;color:#e8ddcd;';
  btn.textContent = text;
  btn.onclick = onClick;
  return btn;
}

function renderServiceChips() {
  const grid = document.getElementById('service-chips');
  grid.innerHTML = '';
  state.services.forEach(svc => {
    const price = svc.price ? `from $${svc.price}` : '';
    const name = svc.name || svc.service_name;
    const id = svc.id;
    grid.appendChild(chip(name, price, state.serviceId === id, () => {
      state.serviceId = id; state.serviceName = name;
      renderServiceChips();
    }));
  });
}

function renderStylistChips() {
  const wrap = document.getElementById('stylist-chips');
  wrap.innerHTML = '';
  const allStaff = [{ id: null, name: 'First available' }, ...state.staff];
  allStaff.forEach(st => {
    const name = st.name;
    wrap.appendChild(smallChip(name, state.staffId === st.id, () => {
      state.staffId = st.id; state.staffName = name;
      renderStylistChips();
    }));
  });
}

function renderTimeChips() {
  const wrap = document.getElementById('time-chips');
  wrap.innerHTML = '';
  times.forEach(t => {
    wrap.appendChild(tinyChip(t, state.time === t, () => {
      state.time = t; renderTimeChips();
    }));
  });
}

async function init() {
  state.services = await loadServices();
  state.staff = await loadStaff();
  if (state.services.length) {
    state.serviceId = state.services[0].id;
    state.serviceName = state.services[0].name || state.services[0].service_name;
  }
  renderServiceChips();
  renderStylistChips();
  renderTimeChips();
}

window.submitForm = async function() {
  const name = document.getElementById('input-name').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  const date = document.getElementById('input-date').value;
  const notes = document.getElementById('input-notes').value.trim();
  const errEl = document.getElementById('form-error');

  const showErr = (msg) => { errEl.textContent = msg; errEl.style.display = 'block'; };
  errEl.style.display = 'none';

  if (!state.serviceId) return showErr('Please select a service.');
  if (!date) return showErr('Please choose a date.');
  if (!state.time) return showErr('Please choose a time.');
  if (!name) return showErr('Please add your name.');
  if (!phone) return showErr('Please add your phone number.');

  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Sending…'; btn.disabled = true;

  // If "First available" chosen, use first staff from list
  let staffId = state.staffId;
  if (!staffId) {
    if (state.staff.length) {
      staffId = state.staff[0].id;
    } else {
      btn.textContent = 'Request appointment'; btn.disabled = false;
      return showErr('Unable to load stylists. Please refresh the page or call us directly.');
    }
  }

  try {
    const res = await fetch('api/index.php?action=book_online', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_name: name,
        client_phone: phone,
        staff_id: staffId,
        service_id: state.serviceId,
        date: date,
        time: state.time,
        notes: notes,
        client_type: 'pre-booked',
      }),
    });

    if (res.ok) {
      const msg = `${state.serviceName} with ${state.staffName}${date ? ', ' + date : ''}${state.time ? ' at ' + state.time : ''}. We'll confirm by message shortly.`;
      document.getElementById('confirm-msg').textContent = msg;
      document.getElementById('form-panel').style.display = 'none';
      document.getElementById('confirm-panel').style.display = 'block';
    } else {
      const data = await res.json().catch(() => ({}));
      showErr(data.error || 'Something went wrong. Please try again.');
      btn.textContent = 'Request appointment'; btn.disabled = false;
    }
  } catch (_) {
    showErr('Network error. Please try again.');
    btn.textContent = 'Request appointment'; btn.disabled = false;
  }
};

window.resetForm = function() {
  state.time = ''; state.serviceId = state.services[0]?.id || null;
  state.serviceName = state.services[0]?.name || '';
  state.staffId = null; state.staffName = 'First available';
  document.getElementById('input-name').value = '';
  document.getElementById('input-phone').value = '';
  document.getElementById('input-date').value = '';
  document.getElementById('input-notes').value = '';
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('confirm-panel').style.display = 'none';
  document.getElementById('form-panel').style.display = 'block';
  renderServiceChips(); renderStylistChips(); renderTimeChips();
};

init();

// --- Three.js salon chair ---
const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 9);

const envC = document.createElement('canvas'); envC.width = 16; envC.height = 256;
const ctx = envC.getContext('2d');
const gr = ctx.createLinearGradient(0, 0, 0, 256);
gr.addColorStop(0, '#2a2018'); gr.addColorStop(0.5, '#0e0b09'); gr.addColorStop(1, '#1c150f');
ctx.fillStyle = gr; ctx.fillRect(0, 0, 16, 256);
ctx.fillStyle = 'rgba(217,177,137,0.9)'; ctx.fillRect(0, 70, 16, 16);
const envTex = new THREE.CanvasTexture(envC); envTex.mapping = THREE.EquirectangularReflectionMapping;
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromEquirectangular(envTex).texture;

scene.add(new THREE.AmbientLight(0xfff0e0, 0.5));
const kLight = new THREE.DirectionalLight(0xfff2e2, 2); kLight.position.set(5, 6, 6); scene.add(kLight);
const rLight = new THREE.DirectionalLight(0xd9b189, 2.4); rLight.position.set(-6, -2, -4); scene.add(rLight);

const group = new THREE.Group(); scene.add(group);
const copper = new THREE.MeshStandardMaterial({ color: 0xc9885a, metalness: 1, roughness: 0.22, envMapIntensity: 1.3 });
const cream = new THREE.MeshStandardMaterial({ color: 0xefe2cf, metalness: 0.35, roughness: 0.35 });
const metal = new THREE.MeshStandardMaterial({ color: 0xcdbfae, metalness: 1, roughness: 0.28, envMapIntensity: 1.4 });
const leather = new THREE.MeshStandardMaterial({ color: 0x6f5642, metalness: 0.1, roughness: 0.55 });

const rbox = (w, h, d, mat) => new THREE.Mesh(new THREE.BoxGeometry(w, h, d, 4, 4, 4), mat);
const chair = new THREE.Group();
const part = (mesh, x, y, z, rx) => { mesh.position.set(x, y, z); if (rx) mesh.rotation.x = rx; chair.add(mesh); return mesh; };

part(new THREE.Mesh(new THREE.CylinderGeometry(1.15, 1.25, 0.16, 56), metal), 0, -2.45, 0);
part(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.26, 1.1, 32), metal), 0, -1.85, 0);
part(new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.55, 24), metal), 0, -1.05, 0);
part(new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.12, 1.75), metal), 0, -0.78, 0.05);
part(rbox(1.7, 0.42, 1.55, leather), 0, -0.52, 0.05);
part(rbox(1.7, 2.0, 0.34, leather), 0, 0.55, -0.72, -0.16);
part(rbox(1.05, 0.5, 0.32, leather), 0, 1.6, -0.88, -0.16);
[-1.0, 1.0].forEach(sx => {
  part(rbox(0.26, 0.2, 1.3, leather), sx, -0.18, 0.1);
  part(new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.5, 16), metal), sx, -0.42, 0.55);
});
part(new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 1.5, 20), metal).rotateZ(Math.PI / 2), 0, -1.5, 0.95);
part(new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.1, 0.5), metal), 0, -1.42, 1.1);

chair.position.set(-1.4, 0, 0);
chair.scale.setScalar(1.05);
group.add(chair);

const orbs = [];
for (let i = 0; i < 10; i++) {
  const o = new THREE.Mesh(new THREE.SphereGeometry(0.06 + Math.random() * 0.06, 16, 16), Math.random() > 0.5 ? copper : cream);
  o.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 4 - 1);
  o.userData = { base: o.position.y, phase: Math.random() * 6.28 };
  group.add(o); orbs.push(o);
}

let scrollTarget = 0, scrollCur = 0, mx = 0, my = 0;
window.addEventListener('scroll', () => { const max = document.documentElement.scrollHeight - window.innerHeight; scrollTarget = max > 0 ? window.scrollY / max : 0; }, { passive: true });
window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
window.addEventListener('pointermove', e => { mx = e.clientX / window.innerWidth - 0.5; my = e.clientY / window.innerHeight - 0.5; });

const clock = new THREE.Clock();
(function loop() {
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime();
  scrollCur += (scrollTarget - scrollCur) * 0.07;
  const p = scrollCur;
  chair.rotation.y = -0.5 + p * Math.PI * 1.6;
  chair.position.y = Math.sin(t * 0.45) * 0.12 + p * 0.4;
  camera.position.x += ((mx * 1.0) - camera.position.x) * 0.05;
  camera.position.y += ((-my * 0.7) - camera.position.y) * 0.05;
  camera.lookAt(-0.6, 0, 0);
  orbs.forEach(o => { o.position.y = o.userData.base + Math.sin(t * 0.5 + o.userData.phase) * 0.22; });
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
